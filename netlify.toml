[build]
publish = "."

[[headers]]
for = "/*"
  [headers.values]
  X-Content-Type-Options = "nosniff"
  Referrer-Policy = "strict-origin-when-cross-origin"
  Permissions-Policy = "geolocation=(), microphone=(), camera=()"

[[headers]]
for = "/assets/*"
  [headers.values]
  Cache-Control = "public, max-age=86400"

[[headers]]
for = "/photos/*"
  [headers.values]
  Cache-Control = "public, max-age=86400"

